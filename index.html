
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movement Order Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a3a5c 0%,#0d6efd 100%);min-height:100vh;padding:16px}
.app-header{background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);border-radius:12px;padding:12px 20px;margin-bottom:14px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,0.25)}
.app-header h2{color:#fff;font-size:20px;text-transform:uppercase;letter-spacing:1px;margin:0}
.app-header .badge{background:#e8a000;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.container{display:flex;gap:14px;flex-wrap:wrap}
.form{flex:0 0 460px;background:#fff;border-radius:12px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#0d6efd;margin:14px 0 6px;padding-bottom:4px;border-bottom:2px solid #e8f0ff}
label{display:block;font-weight:600;margin-top:8px;font-size:12px;color:#444;text-transform:uppercase;letter-spacing:.4px}
input[type=text],input[type=date],select,input:not([type]){width:100%;padding:7px 9px;border:1.5px solid #d0d7e0;border-radius:7px;font-size:13px;color:#111;text-transform:capitalize;margin-top:3px;transition:border .2s}
input:focus,select:focus{border-color:#0d6efd;outline:none;box-shadow:0 0 0 3px rgba(13,110,253,0.12)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{padding:7px 13px;cursor:pointer;border-radius:7px;border:none;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#0b5ed7}
.btn-success{background:#198754;color:#fff}.btn-success:hover{background:#157347}
.btn-danger{background:#dc3545;color:#fff}.btn-danger:hover{background:#bb2d3b}
.btn-warning{background:#e8a000;color:#fff}.btn-warning:hover{background:#cc8e00}
.btn-secondary{background:#6c757d;color:#fff}.btn-secondary:hover{background:#5c636a}
.btn-info{background:#0dcaf0;color:#000}.btn-info:hover{background:#31d2f2}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.gender-group{display:flex;gap:8px;margin-top:4px}
.gender-btn{flex:1;padding:7px;text-align:center;border:2px solid #d0d7e0;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;text-transform:uppercase;transition:all .2s;user-select:none}
.gender-btn.active-boys{border-color:#0d6efd;background:#e8f0ff;color:#0d6efd}
.gender-btn.active-girls{border-color:#d63384;background:#fce8f3;color:#d63384}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
th{background:linear-gradient(135deg,#0d6efd,#0b5ed7);color:#fff;padding:6px 5px;text-align:left;text-transform:uppercase;font-size:10px;letter-spacing:.3px}
td{border:1px solid #e0e7ef;padding:5px 4px;color:#222;text-transform:uppercase}
tr:nth-child(even) td{background:#f0f5ff}
tr.dragging td{background:#fff8e1;opacity:.6}
tr.drag-over td{background:#e8f0fe;outline:2px dashed #0d6efd}
.drag-handle{cursor:grab;color:#aaa;font-size:16px;padding:0 4px;user-select:none}
.drag-handle:active{cursor:grabbing}
.team-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.team-row select{flex:1}
#searchResults div{padding:6px 8px;background:#f8f9ff;border:1px solid #d0d7e0;cursor:pointer;font-size:12px;text-transform:uppercase;border-radius:4px;margin-top:2px}
#searchResults div:hover{background:#e8f0ff;border-color:#0d6efd}
.preview{position:relative;width:210mm;height:297mm;background:#fff;border:2px solid #0d6efd;overflow:hidden;flex-shrink:0;border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,0.3)}
.preview img{position:absolute;left:0;top:0;width:100%;height:100%}
.overlay{position:absolute;font-weight:bold;font-size:11pt;color:#000;white-space:nowrap;text-transform:uppercase}
.import-label{background:#20c997;color:#fff;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.import-label:hover{background:#199d7a}
input[type=file]{display:none}
hr{border:none;border-top:1.5px solid #e0e7ef;margin:12px 0}
</style>
</head>
<body>

<div class="app-header">
  <span style="font-size:24px">📋</span>
  <h2>Movement Order Generator</h2>
  <span class="badge">J&amp;K Sports</span>
</div>

<div class="container">

<div class="form">

  <div class="section-title">📍 Event Details</div>
  <label>Discipline</label><input id="discipline" oninput="updatePreview()">
  <div class="row2">
    <div>
      <label>Age Group</label><input id="agegroup" oninput="updatePreview()">
    </div>
    <div>
      <label>Gender</label>
      <div class="gender-group">
        <div class="gender-btn" id="btn-boys" onclick="setGender('boys')">👦 Boys</div>
        <div class="gender-btn" id="btn-girls" onclick="setGender('girls')">👧 Girls</div>
      </div>
    </div>
  </div>
  <label>Venue</label><input id="venue" oninput="updatePreview()">
  <div class="row2">
    <div><label>From Date</label><input type="date" id="fromdate" oninput="updatePreview()"></div>
    <div><label>To Date</label><input type="date" id="todate" oninput="updatePreview()"></div>
  </div>

  <div class="section-title">👨‍💼 Officials</div>
  <div class="row2">
    <div><label>Official 1 – Name</label><input id="official1" oninput="updatePreview()"></div>
    <div><label>Official 1 – Posting</label><input id="posting1" oninput="updatePreview()"></div>
  </div>
  <div class="row2">
    <div><label>Official 2 – Name</label><input id="official2" oninput="updatePreview()"></div>
    <div><label>Official 2 – Posting</label><input id="posting2" oninput="updatePreview()"></div>
  </div>

  <div class="section-title">🧑‍🎓 Add Student</div>
  <div class="row2">
    <div><label>Student Name</label><input id="studentname"></div>
    <div><label>Parentage</label><input id="parentage"></div>
  </div>
  <div class="row3">
    <div><label>Class</label><input id="classname"></div>
    <div><label>DOB</label><input type="text" id="dob" placeholder="e.g. 01-01-2010"></div>
    <div><label>School</label><input id="school"></div>
  </div>
  <div class="btn-group">
    <button class="btn btn-success" onclick="addStudent()">➕ Add Student</button>
  </div>

  <br>
  <table id="studentTable">
    <thead>
      <tr>
        <th style="width:24px"></th>
        <th>#</th><th>Name</th><th>Parentage</th><th>Class</th><th>DOB</th><th>School</th><th colspan="2">Act</th>
      </tr>
    </thead>
    <tbody id="studentBody"></tbody>
  </table>

  <div class="section-title">💾 Team Management</div>
  <label>Team Name</label><input id="teamName" placeholder="ENTER TEAM NAME">
  <div class="btn-group">
    <button class="btn btn-primary" onclick="saveTeam()">💾 Save Team</button>
  </div>
  <label style="margin-top:8px">Saved Teams</label>
  <div class="team-row">
    <select id="teamSelect" onchange="onTeamSelectChange()">
      <option value="">— SELECT A SAVED TEAM —</option>
    </select>
    <button class="btn btn-warning" onclick="openTeam()">📂 Open</button>
    <button class="btn btn-danger" onclick="deleteTeam()">🗑 Delete</button>
  </div>

  <div class="section-title">🔍 Search &amp; Reuse Player</div>
  <input id="playerSearch" placeholder="TYPE PLAYER NAME…" oninput="searchPlayers()">
  <div id="searchResults"></div>

  <div class="section-title">📄 Actions</div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="exportPDF()">📄 Export PDF</button>
    <label class="import-label">📥 Import Backup
      <input type="file" id="pdfImport" accept=".pdf" onchange="importBackup(event)">
    </label>
    <button class="btn btn-secondary" onclick="updatePreview()">🔄 Preview</button>
  </div>

</div>

<!-- PREVIEW -->
<div class="preview" id="previewBox">
  <img id="templateImg" src="movement_order.jpg" onerror="this.style.opacity=0.05">
  <div class="overlay" id="pdiscipline"  style="top:5cm;left:4cm"></div>
  <div class="overlay" id="pagegroup"    style="top:5cm;left:12.5cm"></div>
  <div class="overlay" id="pgender"      style="top:5cm;left:16cm"></div>
  <div class="overlay" id="pvenue1"      style="top:5.8cm;left:3cm"></div>
  <div class="overlay" id="pvenue2"      style="top:6.5cm;left:2.5cm"></div>
  <div class="overlay" id="pvenue3"      style="top:8.8cm;left:6.2cm"></div>
  <div class="overlay" id="pfrom1"       style="top:5.8cm;left:8.2cm"></div>
  <div class="overlay" id="pfrom2"       style="top:6.5cm;left:8cm"></div>
  <div class="overlay" id="pto"          style="top:6.5cm;left:12cm"></div>
  <div class="overlay" id="pofficial1"   style="top:7.4cm;left:3.5cm"></div>
  <div class="overlay" id="pposting1"    style="top:7.4cm;left:15cm"></div>
  <div class="overlay" id="pofficial2"   style="top:22.5cm;left:11cm"></div>
  <div class="overlay" id="pposting2"    style="top:23.2cm;left:11cm"></div>
  <div id="studentOverlays"></div>
</div>

</div><!-- end .container -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let students=[];let playerDB=[];let selectedGender='';
let dragSrcIdx=null;

window.addEventListener('load',function(){
  try{playerDB=JSON.parse(localStorage.getItem('playerDB')||'[]');}catch(e){}
  refreshTeamList();updatePreview();
});

function setGender(g){
  selectedGender=g;
  document.getElementById('btn-boys').className='gender-btn'+(g==='boys'?' active-boys':'');
  document.getElementById('btn-girls').className='gender-btn'+(g==='girls'?' active-girls':'');
  updatePreview();
}

function updatePreview(){
  var d=val('discipline');
  var ag=val('agegroup');
  var gLabel=selectedGender?'('+selectedGender.toUpperCase()+')':'';
  document.getElementById('pdiscipline').innerText=toTitle(d);
  document.getElementById('pagegroup').innerText=toTitle(ag);
  document.getElementById('pgender').innerText=gLabel;
  ['pvenue1','pvenue2','pvenue3'].forEach(function(id){document.getElementById(id).innerText=toTitle(val('venue'));});
  document.getElementById('pfrom1').innerText=val('fromdate');
  document.getElementById('pfrom2').innerText=val('fromdate');
  document.getElementById('pto').innerText=val('todate');
  document.getElementById('pofficial1').innerText=toTitle(val('official1'));
  document.getElementById('pposting1').innerText=toTitle(val('posting1'));
  document.getElementById('pofficial2').innerText=toTitle(val('official2'));
  document.getElementById('pposting2').innerText=toTitle(val('posting2'));
}

function val(id){var el=document.getElementById(id);return el?el.value||'':'';}

function addStudent(){
  var s={name:toTitle(val('studentname')),parentage:toTitle(val('parentage')),classname:toTitle(val('classname')),dob:val('dob'),school:toTitle(val('school'))};
  if(!s.name){alert('Please enter a student name.');return;}
  students.push(s);
  playerDB.push(Object.assign({},s));
  try{localStorage.setItem('playerDB',JSON.stringify(playerDB));}catch(e){}
  ['studentname','parentage','classname','dob','school'].forEach(function(id){document.getElementById(id).value='';});
  renderStudentTable();renderStudentOverlays();
}

function editStudent(i){
  var s=students[i];if(!s)return;
  document.getElementById('studentname').value=s.name||'';
  document.getElementById('parentage').value=s.parentage||'';
  document.getElementById('classname').value=s.classname||'';
  document.getElementById('dob').value=s.dob||'';
  document.getElementById('school').value=s.school||'';
  students.splice(i,1);renderStudentTable();renderStudentOverlays();
}

function deleteStudent(i){if(!confirm('Delete student #'+(i+1)+'?'))return;students.splice(i,1);renderStudentTable();renderStudentOverlays();}

function renderStudentTable(){
  var tbody=document.getElementById('studentBody');
  tbody.innerHTML='';
  students.forEach(function(s,i){
    var tr=document.createElement('tr');
    tr.draggable=true;
    tr.dataset.idx=i;
    tr.innerHTML=
      '<td class="drag-handle" title="Drag to reorder">☰</td>'+
      '<td>'+(i+1)+'</td>'+
      '<td>'+esc(s.name)+'</td>'+
      '<td>'+esc(s.parentage)+'</td>'+
      '<td>'+esc(s.classname)+'</td>'+
      '<td>'+esc(s.dob)+'</td>'+
      '<td>'+esc(s.school)+'</td>'+
      '<td><button class="btn btn-warning" style="padding:3px 7px;font-size:10px" onclick="editStudent('+i+')">✏️</button></td>'+
      '<td><button class="btn btn-danger" style="padding:3px 7px;font-size:10px" onclick="deleteStudent('+i+')">❌</button></td>';
    tr.addEventListener('dragstart',function(e){dragSrcIdx=parseInt(this.dataset.idx);this.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    tr.addEventListener('dragend',function(){this.classList.remove('dragging');document.querySelectorAll('#studentBody tr').forEach(function(r){r.classList.remove('drag-over');});});
    tr.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('#studentBody tr').forEach(function(r){r.classList.remove('drag-over');});this.classList.add('drag-over');});
    tr.addEventListener('drop',function(e){e.stopPropagation();var dropIdx=parseInt(this.dataset.idx);if(dragSrcIdx!==null&&dragSrcIdx!==dropIdx){var moved=students.splice(dragSrcIdx,1)[0];students.splice(dropIdx,0,moved);renderStudentTable();renderStudentOverlays();}dragSrcIdx=null;});
    tbody.appendChild(tr);
  });
}

function renderStudentOverlays(){
  var box=document.getElementById('studentOverlays');var html='';
  students.forEach(function(s,i){
    var top=(13.8+i*0.68).toFixed(2);
    html+='<div class="overlay" style="top:'+top+'cm;left:3.0cm">'+esc(s.name)+'</div>'+
          '<div class="overlay" style="top:'+top+'cm;left:7.5cm">'+esc(s.parentage)+'</div>'+
          '<div class="overlay" style="top:'+top+'cm;left:11.6cm">'+esc(s.classname)+'</div>'+
          '<div class="overlay" style="top:'+top+'cm;left:13.5cm">'+esc(s.dob)+'</div>'+
          '<div class="overlay" style="top:'+top+'cm;left:15.8cm">'+esc(s.school)+'</div>';
  });
  box.innerHTML=html;
}

function esc(str){return(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getAllData(){
  return{discipline:val('discipline'),agegroup:val('agegroup'),gender:selectedGender,venue:val('venue'),fromdate:val('fromdate'),todate:val('todate'),official1:val('official1'),posting1:val('posting1'),official2:val('official2'),posting2:val('posting2'),students:students||[]};
}

function loadData(d){
  d=d||{};
  ['discipline','agegroup','venue','fromdate','todate','official1','posting1','official2','posting2'].forEach(function(id){document.getElementById(id).value=d[id]||'';});
  if(d.gender)setGender(d.gender);
  students=Array.isArray(d.students)?d.students:[];
  renderStudentTable();renderStudentOverlays();updatePreview();
}

function getSavedTeamNames(){
  var names=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('team_')===0)names.push(k.substring(5));}
  names.sort(function(a,b){return a.localeCompare(b);});return names;
}

function refreshTeamList(){
  var select=document.getElementById('teamSelect');var names=getSavedTeamNames();var current=select.value;
  select.innerHTML='<option value="">— SELECT A SAVED TEAM —</option>'+names.map(function(n){return'<option value="'+esc(n)+'">'+esc(n)+'</option>';}).join('');
  if(names.indexOf(current)!==-1)select.value=current;
}

function onTeamSelectChange(){var name=document.getElementById('teamSelect').value;if(name)document.getElementById('teamName').value=name;}

function saveTeam(){
  var name=toTitle(val('teamName').trim());if(!name){alert('Please enter a team name first.');return;}
  try{localStorage.setItem('team_'+name,JSON.stringify(getAllData()));refreshTeamList();document.getElementById('teamSelect').value=name;alert('Team "'+name+'" saved!');}catch(e){alert('Save failed: '+e.message);}
}

function openTeam(){
  var name=(document.getElementById('teamSelect').value||val('teamName').trim()).toUpperCase();if(!name){alert('Please select or enter a team name.');return;}
  var raw=localStorage.getItem('team_'+name);if(!raw){alert('Team "'+name+'" not found.');return;}
  try{loadData(JSON.parse(raw));document.getElementById('teamName').value=name;alert('Team "'+name+'" loaded!');}catch(e){alert('Failed: '+e.message);}
}

function deleteTeam(){
  var name=(document.getElementById('teamSelect').value||val('teamName').trim()).toUpperCase();if(!name){alert('Please select or enter a team name.');return;}
  if(!confirm('Delete team "'+name+'"?'))return;
  localStorage.removeItem('team_'+name);refreshTeamList();alert('Team "'+name+'" deleted.');
}

function searchPlayers(){
  var q=document.getElementById('playerSearch').value.toLowerCase();
  var res=playerDB.filter(function(p){return(p.name||'').toLowerCase().includes(q);}).slice(0,10);
  window._searchRes=res;
  document.getElementById('searchResults').innerHTML=res.map(function(p,i){return'<div onclick="reusePlayer('+i+')">'+esc(p.name)+(p.school?' – '+esc(p.school):'' )+'</div>';}).join('');
}

function reusePlayer(i){
  var p=window._searchRes[i];if(!p)return;
  students.push(Object.assign({},p));renderStudentTable();renderStudentOverlays();
  document.getElementById('playerSearch').value='';document.getElementById('searchResults').innerHTML='';
}

async function exportPDF(){
  try{
    var disciplineName=val('discipline').trim().toUpperCase().replace(/\s+/g,'_')||'MOVEMENT_ORDER';
    var filename=disciplineName+'_ORDER.pdf';
    const preview=document.getElementById('previewBox');
    const canvas=await html2canvas(preview,{scale:3,useCORS:true,allowTaint:true});
    const imgData=canvas.toDataURL('image/jpeg',1.0);
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    pdf.addImage(imgData,'JPEG',0,0,210,297);
    var data=getAllData();
    var jsonStr=JSON.stringify({version:'1.0',data:data});
    pdf.setFontSize(1);pdf.setTextColor(255,255,255);
    var chunkSize=400;var yPos=295;
    for(var i=0;i<jsonStr.length;i+=chunkSize){
      pdf.text('MO_JSON_CHUNK:'+jsonStr.substring(i,i+chunkSize),2,yPos);
      yPos+=1;if(yPos>296){pdf.addPage();yPos=5;}
    }
    pdf.setTextColor(0,0,0);
    pdf.save(filename);
  }catch(err){alert('PDF export failed: '+err.message);console.error(err);}
}

function importBackup(event){
  var file=event.target.files[0];if(!file)return;
  ensurePdfJsLoaded().then(function(){
    var reader=new FileReader();
    reader.onload=function(){
      var typedArray=new Uint8Array(reader.result);
      window.pdfjsLib.getDocument({data:typedArray}).promise.then(function(pdf){
        var pp=[];for(var p=1;p<=pdf.numPages;p++){pp.push(pdf.getPage(p).then(function(page){return page.getTextContent().then(function(tc){return tc.items.map(function(it){return it.str;}).join('\n');});}));}
        Promise.all(pp).then(function(pagesText){restoreFromExtractedText(pagesText.join('\n'));event.target.value='';}).catch(function(e){alert('Could not read PDF text: '+e.message);});
      }).catch(function(e){alert('Could not open PDF: '+e.message);});
    };
    reader.readAsArrayBuffer(file);
  }).catch(function(e){alert('Could not load PDF reader: '+e.message);});
}

function restoreFromExtractedText(fullText){
  var regex=/MO_JSON_CHUNK:([^\n]*)/g;var match;var chunks=[];
  while((match=regex.exec(fullText))!==null){chunks.push(match[1]);}
  if(chunks.length===0){alert('No embedded data found in this PDF.');return;}
  var jsonStr=chunks.join('');var lastBrace=jsonStr.lastIndexOf('}');
  if(lastBrace!==-1)jsonStr=jsonStr.substring(0,lastBrace+1);
    <label>Discipline</label><input id="discipline">
  <label>Age Group</label><input id="agegroup">
  <label>Venue</label><input id="venue">

  <label>To Date</label><input id="todate">

  <hr>
  <label>Official 1 – Name</label><input id="official1">
  <label>Official 1 – Posting</label><input id="posting1">

  <div class="btn-group">

  <br>
  <table id="studentTable" border="1">

      </tr>
    </thead>
    <tbody id="studentBody"></tbody>
  </table>

  <hr>
  <label>Team Name</label><input id="teamName" placeholder="Enter team name to save">
  <div class="btn-group">
    <button onclick="saveTeam()">💾 Save Team</button>
  </div>

  <label>Saved Teams</label>
  <div class="team-row">
    <select id="teamSelect" onchange="onTeamSelectChange()">
      <option value="">— select a saved team —</option>

    <button onclick="openTeam()">📂 Open</button>
    <button onclick="deleteTeam()">🗑 Delete</button>
  </div>

  <hr>

  <input id="playerSearch" placeholder="Type player name…" oninput="searchPlayers()">

  <hr>

      <input type="file" id="pdfImport" accept=".pdf" onchange="importBackup(event)" style="width:auto">
    </label>
  </div>

  <div class="btn-group">
    <button onclick="updatePreview()">🔄 Update Preview</button>
  </div>

</div>

<!-- ====== PREVIEW ====== -->
<div class="preview" id="previewBox">
  <img id="templateImg" src="movement_order.jpg" onerror="this.style.opacity=0.05">

  <div class="overlay" id="pdiscipline"   style="top:5cm;left:4cm"></div>
  <div class="overlay" id="pagegroup"     style="top:5cm;left:12.5cm"></div>
  <div class="overlay" id="pvenue1"       style="top:5.8cm;left:3cm"></div>
  <div class="overlay" id="pvenue2"       style="top:6.5cm;left:2.5cm"></div>
  <div class="overlay" id="pvenue3"       style="top:8.8cm;left:6.2cm"></div>

  <!-- From Date appears twice, 3cm apart vertically -->
  <div class="overlay" id="pfrom1"        style="top:5.8cm;left:8.2cm"></div>
  <div class="overlay" id="pfrom2"        style="top:6.5cm;left:8cm"></div>
  <div class="overlay" id="pto"           style="top:6.5cm;left:12cm"></div>

  <div class="overlay" id="pofficial1"    style="top:7.4cm;left:3.5cm"></div>
  <div class="overlay" id="pposting1"     style="top:7.4cm;left:15cm"></div>

  <div class="overlay" id="pofficial2"    style="top:22.5cm;left:11cm"></div>
  <div class="overlay" id="pposting2"     style="top:23.2cm;left:11cm"></div>
  <div id="studentOverlays"></div>
</div>

</div><!-- end .container -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let students = [];
let playerDB = [];

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', function () {
  try { playerDB = JSON.parse(localStorage.getItem('playerDB') || '[]'); } catch(e) {}
  refreshTeamList();
  updatePreview();
});

// Live preview on any input change
document.addEventListener('input', function () { updatePreview(); });

// ─── Preview ──────────────────────────────────────────────────────────────────
function updatePreview() {
  document.getElementById('pdiscipline').innerText = val('discipline');
  document.getElementById('pagegroup').innerText   = val('agegroup');
  document.getElementById('pvenue1').innerText     = val('venue');
  document.getElementById('pvenue2').innerText     = val('venue');
  document.getElementById('pvenue3').innerText     = val('venue');
  document.getElementById('pfrom1').innerText      = val('fromdate');
  document.getElementById('pfrom2').innerText      = val('fromdate');
  document.getElementById('pto').innerText         = val('todate');
  document.getElementById('pofficial1').innerText  = val('official1');
  document.getElementById('pposting1').innerText   = val('posting1');
  document.getElementById('pofficial2').innerText  = val('official2');
  document.getElementById('pposting2').innerText   = val('posting2');
}

function val(id) { return document.getElementById(id).value || ''; }

// ─── Students ─────────────────────────────────────────────────────────────────
function addStudent() {
  var s = {
    name:      val('studentname'),
    parentage: val('parentage'),
    classname: val('classname'),
    dob:       val('dob'),
    school:    val('school')
  };
  if (!s.name) { alert('Please enter a student name.'); return; }
  students.push(s);

  playerDB.push(Object.assign({}, s));
  try { localStorage.setItem('playerDB', JSON.stringify(playerDB)); } catch(e) {}

  ['studentname','parentage','classname','dob','school'].forEach(function(id){
    document.getElementById(id).value = '';
  });

  renderStudentTable();
  renderStudentOverlays();
}

function editStudent(i) {
  var s = students[i];
  if (!s) return;
  document.getElementById('studentname').value = s.name      || '';
  document.getElementById('parentage').value   = s.parentage || '';
  document.getElementById('classname').value   = s.classname || '';
  document.getElementById('dob').value         = s.dob       || '';
  document.getElementById('school').value      = s.school    || '';
  students.splice(i, 1);
  renderStudentTable();
  renderStudentOverlays();
}

function deleteStudent(i) {
  if (!confirm('Delete student #' + (i + 1) + '?')) return;
  students.splice(i, 1);
  renderStudentTable();
  renderStudentOverlays();
}

function renderStudentTable() {
  var html = '';
  students.forEach(function(s, i) {
    html += '<tr>' +
      '<td>' + (i + 1) + '</td>' +
      '<td>' + esc(s.name) + '</td>' +
      '<td>' + esc(s.parentage) + '</td>' +
      '<td>' + esc(s.classname) + '</td>' +
      '<td>' + esc(s.dob) + '</td>' +
      '<td>' + esc(s.school) + '</td>' +
      '<td><button onclick="editStudent(' + i + ')">✏️</button></td>' +
      '<td><button onclick="deleteStudent(' + i + ')">❌</button></td>' +
      '</tr>';
  });
  document.getElementById('studentBody').innerHTML = html;
}

function renderStudentOverlays() {
  var box = document.getElementById('studentOverlays');
  var html = '';
  students.forEach(function(s, i) {
    var top = (13.8 + i * 0.68).toFixed(2);
    html +=
      '<div class="overlay" style="top:' + top + 'cm;left:3.0cm">'  + esc(s.name)      + '</div>' +
      '<div class="overlay" style="top:' + top + 'cm;left:7.5cm">'  + esc(s.parentage) + '</div>' +
      '<div class="overlay" style="top:' + top + 'cm;left:11.6cm">'  + esc(s.classname) + '</div>' +
      '<div class="overlay" style="top:' + top + 'cm;left:13.5cm">' + esc(s.dob)       + '</div>' +
      '<div class="overlay" style="top:' + top + 'cm;left:15.8cm">' + esc(s.school)    + '</div>';
  });
  box.innerHTML = html;
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Team Save / Load / Delete ────────────────────────────────────────────────
function getAllData() {
  return {
    discipline: val('discipline'),
    agegroup:   val('agegroup'),
    venue:      val('venue'),
    fromdate:   val('fromdate'),
    todate:     val('todate'),
    official1:  val('official1'),
    posting1:   val('posting1'),
    official2:  val('official2'),
    posting2:   val('posting2'),
    students:   students || []
  };
}

function loadData(d) {
  d = d || {};
  var fields = ['discipline','agegroup','venue','fromdate','todate',
                'official1','posting1','official2','posting2'];
  fields.forEach(function(id) {
    document.getElementById(id).value = d[id] || '';
  });
  students = Array.isArray(d.students) ? d.students : [];
  renderStudentTable();
  renderStudentOverlays();
  updatePreview();
}

// Returns array of saved team names (without the "team_" prefix)
function getSavedTeamNames() {
  var names = [];
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    if (key && key.indexOf('team_') === 0) {
      names.push(key.substring(5));
    }
  }
  names.sort(function(a, b) { return a.localeCompare(b); });
  return names;
}

// Rebuilds the <select> dropdown with all currently saved teams
function refreshTeamList() {
  var select = document.getElementById('teamSelect');
  var names = getSavedTeamNames();
  var current = select.value;
  select.innerHTML = '<option value="">— select a saved team —</option>' +
    names.map(function(n) {
      return '<option value="' + esc(n) + '">' + esc(n) + '</option>';
    }).join('');
  // Restore previous selection if it still exists
  if (names.indexOf(current) !== -1) select.value = current;
}

function onTeamSelectChange() {
  var name = document.getElementById('teamSelect').value;
  if (name) document.getElementById('teamName').value = name;
}

function saveTeam() {
  var name = val('teamName').trim();
  if (!name) { alert('Please enter a team name first.'); return; }
  try {
    localStorage.setItem('team_' + name, JSON.stringify(getAllData()));
    refreshTeamList();
    document.getElementById('teamSelect').value = name;
    alert('✅ Team "' + name + '" saved successfully!');
  } catch(e) {
    alert('❌ Save failed: ' + e.message);
  }
}

function openTeam() {
  var name = document.getElementById('teamSelect').value || val('teamName').trim();
  if (!name) { alert('Please select or enter a team name to load.'); return; }
  var raw = localStorage.getItem('team_' + name);
  if (!raw) { alert('❌ Team "' + name + '" not found in storage.'); return; }
  try {
    loadData(JSON.parse(raw));
    document.getElementById('teamName').value = name;
    alert('✅ Team "' + name + '" loaded!');
  } catch(e) {
    alert('❌ Failed to load: ' + e.message);
  }
}

function deleteTeam() {
  var name = document.getElementById('teamSelect').value || val('teamName').trim();
  if (!name) { alert('Please select or enter a team name to delete.'); return; }
  if (!confirm('Delete team "' + name + '"?')) return;
  localStorage.removeItem('team_' + name);
  refreshTeamList();
  alert('🗑 Team "' + name + '" deleted.');
}

// ─── Player Search & Reuse ────────────────────────────────────────────────────
function searchPlayers() {
  var q = document.getElementById('playerSearch').value.toLowerCase();
  var res = playerDB.filter(function(p) {
    return (p.name || '').toLowerCase().includes(q);
  }).slice(0, 10);
  window._searchRes = res;
  document.getElementById('searchResults').innerHTML = res.map(function(p, i) {
    return '<div onclick="reusePlayer(' + i + ')">' + esc(p.name) +
           (p.school ? ' – ' + esc(p.school) : '') + '</div>';
  }).join('');
}

function reusePlayer(i) {
  var p = window._searchRes[i];
  if (!p) return;
  students.push(Object.assign({}, p));
  renderStudentTable();
  renderStudentOverlays();
  document.getElementById('playerSearch').value = '';
  document.getElementById('searchResults').innerHTML = '';
}

// ─── PDF Export (visual snapshot + invisible embedded JSON for re-import) ────
async function exportPDF() {
  try {
    const preview = document.getElementById('previewBox');
    const canvas = await html2canvas(preview, {
      scale: 3,
      useCORS: true,
      allowTaint: true
    });

    const imgData = canvas.toDataURL('image/jpeg', 1.0);
    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: 'a4'
    });

    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);

    // Embed the full data as invisible (white, tiny) text so the same PDF
    // can be re-imported later to restore all fields and students.
    var data = getAllData();
    var jsonStr = JSON.stringify({ version: '1.0', data: data });
    pdf.setFontSize(1);
    pdf.setTextColor(255, 255, 255);
    // jsPDF can choke on extremely long single text() calls — split into chunks
    var chunkSize = 400;
    var yPos = 295;
    for (var i = 0; i < jsonStr.length; i += chunkSize) {
      pdf.text('MO_JSON_CHUNK:' + jsonStr.substring(i, i + chunkSize), 2, yPos);
      yPos += 1;
      if (yPos > 296) { pdf.addPage(); yPos = 5; }
    }
    pdf.setTextColor(0, 0, 0);

    pdf.save('Movement_Order.pdf');

  } catch (err) {
    alert('PDF export failed: ' + err.message);
    console.error(err);
  }
}

// ─── PDF Import / Backup Restore ─────────────────────────────────────────────
// Reads the PDF, extracts the embedded invisible text layer via pdf.js,
// reassembles the chunks, and restores all fields + students.
function importBackup(event) {
  var file = event.target.files[0];
  if (!file) return;

  ensurePdfJsLoaded().then(function () {
    var reader = new FileReader();
    reader.onload = function () {
      var typedArray = new Uint8Array(reader.result);
      window.pdfjsLib.getDocument({ data: typedArray }).promise.then(function (pdf) {
        var pageTextPromises = [];
        for (var p = 1; p <= pdf.numPages; p++) {
          pageTextPromises.push(
            pdf.getPage(p).then(function (page) {
              return page.getTextContent().then(function (tc) {
                return tc.items.map(function (it) { return it.str; }).join('\n');
              });
            })
          );
        }
        Promise.all(pageTextPromises).then(function (pagesText) {
          var fullText = pagesText.join('\n');
          restoreFromExtractedText(fullText);
          event.target.value = '';
        }).catch(function (e) {
          alert('❌ Could not read PDF text: ' + e.message);
        });
      }).catch(function (e) {
        alert('❌ Could not open PDF: ' + e.message);
      });
    };
    reader.readAsArrayBuffer(file);
  }).catch(function (e) {
    alert('❌ Could not load PDF reader library: ' + e.message);
  });
}

function restoreFromExtractedText(fullText) {
  // Find every chunk marker and reassemble in order
  var regex = /MO_JSON_CHUNK:([^\n]*)/g;
  var match;
  var chunks = [];
  while ((match = regex.exec(fullText)) !== null) {
    chunks.push(match[1]);
  }
  if (chunks.length === 0) {
    alert('❌ No embedded data found in this PDF.\nOnly PDFs exported by this system can be re-imported.');
    return;
  }
  var jsonStr = chunks.join('');
  // Trim anything after the last closing brace, just in case of trailing noise
  var lastBrace = jsonStr.lastIndexOf('}');
  if (lastBrace !== -1) jsonStr = jsonStr.substring(0, lastBrace + 1);

  try {
    var obj = JSON.parse(jsonStr);
    if (obj && obj.data) {
      loadData(obj.data);
      alert('✅ Data imported successfully!');
    } else {
      alert('❌ JSON structure not recognised.');
    }
  } catch (e) {
    alert('❌ Import failed while parsing data: ' + e.message);
  }
}

// Lazily load pdf.js (only needed for import)
function ensurePdfJsLoaded() {
  return new Promise(function (resolve, reject) {
    if (window.pdfjsLib) { resolve(); return; }
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = function () {
      try {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve();
      } catch (e) { reject(e); }
    };
    script.onerror = function () { reject(new Error('Failed to load pdf.js from CDN')); };
    document.head.appendChild(script);
  });
}
</script>
</body>
