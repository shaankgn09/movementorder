<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movement Order Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a3a5c 0%,#0d6efd 100%);min-height:100vh;padding:16px}
.app-header{background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);border-radius:12px;padding:12px 20px;margin-bottom:14px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,0.25)}
.app-header h2{color:#fff;font-size:20px;text-transform:uppercase;letter-spacing:1px;margin:0}
.app-header .badge{background:#e8a000;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.container{display:flex;gap:14px;flex-wrap:wrap}
.form{flex:0 0 460px;background:#fff;border-radius:12px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#0d6efd;margin:14px 0 6px;padding-bottom:4px;border-bottom:2px solid #e8f0ff}
label{display:block;font-weight:600;margin-top:8px;font-size:12px;color:#444;text-transform:uppercase;letter-spacing:.4px}
input[type=text],select,input:not([type]){width:100%;padding:7px 9px;border:1.5px solid #d0d7e0;border-radius:7px;font-size:13px;color:#111;text-transform:capitalize;margin-top:3px;transition:border .2s}
input:focus,select:focus{border-color:#0d6efd;outline:none;box-shadow:0 0 0 3px rgba(13,110,253,0.12)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{padding:7px 13px;cursor:pointer;border-radius:7px;border:none;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#0b5ed7}
.btn-success{background:#198754;color:#fff}.btn-success:hover{background:#157347}
.btn-danger{background:#dc3545;color:#fff}.btn-danger:hover{background:#bb2d3b}
.btn-warning{background:#e8a000;color:#fff}.btn-warning:hover{background:#cc8e00}
.btn-secondary{background:#6c757d;color:#fff}.btn-secondary:hover{background:#5c636a}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.team-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.team-row select{flex:1}
#searchResults div{padding:6px 8px;background:#f8f9ff;border:1px solid #d0d7e0;cursor:pointer;font-size:12px;text-transform:uppercase;border-radius:4px;margin-top:2px}
#searchResults div:hover{background:#e8f0ff;border-color:#0d6efd}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
th{background:linear-gradient(135deg,#0d6efd,#0b5ed7);color:#fff;padding:6px 5px;text-align:left;text-transform:uppercase;font-size:10px;letter-spacing:.3px}
td{border:1px solid #e0e7ef;padding:5px 4px;color:#222;text-transform:capitalize}
tr:nth-child(even) td{background:#f0f5ff}
.preview{position:relative;width:210mm;height:297mm;background:#fff;border:2px solid #0d6efd;overflow:hidden;flex-shrink:0;border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,0.3)}
.preview img{position:absolute;left:0;top:0;width:100%;height:100%}
.overlay{position:absolute;font-weight:bold;font-size:11pt;color:#000;white-space:nowrap;text-transform:uppercase}
.import-label{background:#20c997;color:#fff;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.import-label:hover{background:#199d7a}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="app-header">
  <span style="font-size:24px">📋</span>
  <h2>Movement Order Generator</h2>
  <span class="badge">J&amp;K Sports</span>
</div>

<div class="container">
<div class="form">

  <div class="section-title">📍 Event Details</div>
  <label>Discipline</label><input type="text" id="discipline" oninput="updatePreview()">
  <div class="row2">
    <div><label>Age Group</label><input type="text" id="agegroup" oninput="updatePreview()"></div>
    <div><label>Gender</label><input type="text" id="gender" placeholder="Boys / Girls" oninput="updatePreview()"></div>
  </div>
  <label>Venue</label><input type="text" id="venue" oninput="updatePreview()">
  <div class="row2">
    <div><label>From Date</label><input type="text" id="fromdate" placeholder="e.g. 01-06-2025" oninput="updatePreview()"></div>
    <div><label>To Date</label><input type="text" id="todate" placeholder="e.g. 05-06-2025" oninput="updatePreview()"></div>
  </div>

  <div class="section-title">👨‍💼 Officials</div>
  <div class="row2">
    <div><label>Official 1 – Name</label><input type="text" id="official1" oninput="updatePreview()"></div>
    <div><label>Official 1 – Posting</label><input type="text" id="posting1" oninput="updatePreview()"></div>
  </div>
  <div class="row2">
    <div><label>Official 2 – Name</label><input type="text" id="official2" oninput="updatePreview()"></div>
    <div><label>Official 2 – Posting</label><input type="text" id="posting2" oninput="updatePreview()"></div>
  </div>

  <div class="section-title">🧑‍🎓 Add Student</div>
  <div class="row2">
    <div><label>Student Name</label><input type="text" id="studentname"></div>
    <div><label>Parentage</label><input type="text" id="parentage"></div>
  </div>
  <div class="row3">
    <div><label>Class</label><input type="text" id="classname"></div>
    <div><label>DOB</label><input type="text" id="dob" placeholder="01-01-2010"></div>
    <div><label>School</label><input type="text" id="school"></div>
  </div>
  <div class="btn-group">
    <button class="btn btn-success" onclick="addStudent()">➕ Add Student</button>
  </div>

  <br>
  <table>
    <thead>
      <tr><th>#</th><th>Name</th><th>Parentage</th><th>Class</th><th>DOB</th><th>School</th><th>Move</th><th colspan="2">Act</th></tr>
    </thead>
    <tbody id="studentBody"></tbody>
  </table>

  <div class="section-title">💾 Team Management</div>
  <label>Team Name</label><input type="text" id="teamName" placeholder="Enter team name">
  <div class="btn-group">
    <button class="btn btn-primary" onclick="saveTeam()">💾 Save Team</button>
  </div>
  <label style="margin-top:8px">Saved Teams</label>
  <div class="team-row">
    <select id="teamSelect">
      <option value="">— Select a saved team —</option>
    </select>
    <button class="btn btn-warning" onclick="openTeam()">📂 Open</button>
    <button class="btn btn-danger" onclick="deleteTeam()">🗑 Delete</button>
  </div>

  <div class="section-title">🔍 Search &amp; Reuse Player</div>
  <input type="text" id="playerSearch" placeholder="Type player name…" oninput="searchPlayers()">
  <div id="searchResults"></div>

  <div class="section-title">📄 Actions</div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="exportPDF()">📄 Export PDF</button>
    <label class="import-label">📥 Import Backup
      <input type="file" id="pdfImport" accept=".pdf" onchange="importBackup(event)">
    </label>
    <button class="btn btn-secondary" onclick="updatePreview()">🔄 Preview</button>
  </div>

</div>

<!-- PREVIEW -->
<div class="preview" id="previewBox">
  <img src="movement_order.jpg" onerror="this.style.opacity=0.05">
  <div class="overlay" id="pdiscipline" style="top:5cm;left:4cm"></div>
  <div class="overlay" id="pagegroup"   style="top:5cm;left:12.5cm"></div>
  <div class="overlay" id="pgender"     style="top:5cm;left:14.1cm"></div>
  <div class="overlay" id="pvenue1"     style="top:5.8cm;left:3cm"></div>
  <div class="overlay" id="pvenue2"     style="top:6.5cm;left:2.5cm"></div>
  <div class="overlay" id="pvenue3"     style="top:8.8cm;left:6.2cm"></div>
  <div class="overlay" id="pfrom1"      style="top:5.8cm;left:8.2cm"></div>
  <div class="overlay" id="pfrom2"      style="top:6.5cm;left:8cm"></div>
  <div class="overlay" id="pto"         style="top:6.5cm;left:12cm"></div>
  <div class="overlay" id="pofficial1"  style="top:7.4cm;left:3.5cm"></div>
  <div class="overlay" id="pposting1"   style="top:7.4cm;left:15cm"></div>
  <div class="overlay" id="pofficial2"  style="top:22.5cm;left:11cm"></div>
  <div class="overlay" id="pposting2"   style="top:23.2cm;left:11cm"></div>
  <div id="studentOverlays"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

var students = [];
var playerDB = [];

// ── key helpers ──────────────────────────────────────────────────────────────
// All teams are stored with key "team_<EXACT_NAME>" where name is whatever
// the user typed. We never transform the name — store and retrieve identically.

function teamKey(name){ return 'team_' + name; }

// ── init ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', function(){
  try{ playerDB = JSON.parse(localStorage.getItem('playerDB') || '[]'); }catch(e){}
  refreshTeamList();
  updatePreview();
});

// ── preview ──────────────────────────────────────────────────────────────────
function updatePreview(){
  set('pdiscipline', toTitle(val('discipline')));
  set('pagegroup',   toTitle(val('agegroup')));
  set('pgender',     toTitle(val('gender')));
  set('pvenue1',     toTitle(val('venue')));
  set('pvenue2',     toTitle(val('venue')));
  set('pvenue3',     toTitle(val('venue')));
  set('pfrom1',      val('fromdate'));
  set('pfrom2',      val('fromdate'));
  set('pto',         val('todate'));
  set('pofficial1',  toTitle(val('official1')));
  set('pposting1',   toTitle(val('posting1')));
  set('pofficial2',  toTitle(val('official2')));
  set('pposting2',   toTitle(val('posting2')));
}

function set(id, text){ var el=document.getElementById(id); if(el) el.innerText=text; }
function val(id){ var el=document.getElementById(id); return el ? (el.value||'') : ''; }
function toTitle(s){ return (s||'').replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.substr(1).toLowerCase();}); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── students ─────────────────────────────────────────────────────────────────
function addStudent(){
  var s = {
    name:      toTitle(val('studentname')),
    parentage: toTitle(val('parentage')),
    classname: toTitle(val('classname')),
    dob:       val('dob'),
    school:    toTitle(val('school'))
  };
  if(!s.name){ alert('Please enter a student name.'); return; }
  students.push(s);
  playerDB.push(Object.assign({}, s));
  try{ localStorage.setItem('playerDB', JSON.stringify(playerDB)); }catch(e){}
  ['studentname','parentage','classname','dob','school'].forEach(function(id){ document.getElementById(id).value=''; });
  renderStudentTable();
  renderStudentOverlays();
}

function moveStudent(i, dir){
  var j = i + dir;
  if(j < 0 || j >= students.length) return;
  var tmp = students[i]; students[i] = students[j]; students[j] = tmp;
  renderStudentTable();
  renderStudentOverlays();
}

function editStudent(i){
  var s = students[i]; if(!s) return;
  document.getElementById('studentname').value = s.name      || '';
  document.getElementById('parentage').value   = s.parentage || '';
  document.getElementById('classname').value   = s.classname || '';
  document.getElementById('dob').value         = s.dob       || '';
  document.getElementById('school').value      = s.school    || '';
  students.splice(i, 1);
  renderStudentTable();
  renderStudentOverlays();
}

function deleteStudent(i){
  if(!confirm('Delete student #'+(i+1)+'?')) return;
  students.splice(i, 1);
  renderStudentTable();
  renderStudentOverlays();
}

function renderStudentTable(){
  var tbody = document.getElementById('studentBody');
  tbody.innerHTML = '';
  students.forEach(function(s, i){
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>'+(i+1)+'</td>'+
      '<td>'+esc(s.name)+'</td>'+
      '<td>'+esc(s.parentage)+'</td>'+
      '<td>'+esc(s.classname)+'</td>'+
      '<td>'+esc(s.dob)+'</td>'+
      '<td>'+esc(s.school)+'</td>'+
      '<td style="white-space:nowrap">'+
        '<button class="btn btn-secondary" style="padding:2px 6px;font-size:11px" onclick="moveStudent('+i+',-1)"'+(i===0?' disabled':'')+'>▲</button> '+
        '<button class="btn btn-secondary" style="padding:2px 6px;font-size:11px" onclick="moveStudent('+i+',1)"'+(i===students.length-1?' disabled':'')+'>▼</button>'+
      '</td>'+
      '<td><button class="btn btn-warning" style="padding:3px 7px;font-size:10px" onclick="editStudent('+i+')">✏️</button></td>'+
      '<td><button class="btn btn-danger"  style="padding:3px 7px;font-size:10px" onclick="deleteStudent('+i+')">❌</button></td>';
    tbody.appendChild(tr);
  });
}

function renderStudentOverlays(){
  var html = '';
  students.forEach(function(s, i){
    var top = (13.8 + i * 0.68).toFixed(2);
    html +=
      '<div class="overlay" style="top:'+top+'cm;left:3.0cm">'+esc(s.name)+'</div>'+
      '<div class="overlay" style="top:'+top+'cm;left:7.5cm">'+esc(s.parentage)+'</div>'+
      '<div class="overlay" style="top:'+top+'cm;left:11.6cm">'+esc(s.classname)+'</div>'+
      '<div class="overlay" style="top:'+top+'cm;left:13.5cm">'+esc(s.dob)+'</div>'+
      '<div class="overlay" style="top:'+top+'cm;left:15.8cm">'+esc(s.school)+'</div>';
  });
  document.getElementById('studentOverlays').innerHTML = html;
}

// ── data helpers ─────────────────────────────────────────────────────────────
function getAllData(){
  return {
    discipline: val('discipline'), agegroup: val('agegroup'), gender: val('gender'),
    venue: val('venue'), fromdate: val('fromdate'), todate: val('todate'),
    official1: val('official1'), posting1: val('posting1'),
    official2: val('official2'), posting2: val('posting2'),
    students: students || []
  };
}

function loadData(d){
  d = d || {};
  ['discipline','agegroup','gender','venue','fromdate','todate',
   'official1','posting1','official2','posting2'].forEach(function(id){
    document.getElementById(id).value = d[id] || '';
  });
  students = Array.isArray(d.students) ? d.students : [];
  renderStudentTable();
  renderStudentOverlays();
  updatePreview();
}

// ── team management ──────────────────────────────────────────────────────────
// Strategy: store exactly as "team_<name>" with no case transformation.
// The dropdown option VALUE = exact key suffix (what comes after "team_").
// Save → store with exact name → rebuild dropdown → select that exact value.
// Open → read dropdown value (exact suffix) → lookup "team_"+suffix.

function getSavedTeams(){
  // Returns array of exact key suffixes (the name part after "team_")
  var list = [];
  for(var i = 0; i < localStorage.length; i++){
    var k = localStorage.key(i);
    if(k && k.indexOf('team_') === 0) list.push(k.slice(5));
  }
  list.sort(function(a,b){ return a.toLowerCase().localeCompare(b.toLowerCase()); });
  return list;
}

function refreshTeamList(){
  var sel = document.getElementById('teamSelect');
  var teams = getSavedTeams();
  sel.innerHTML = '<option value="">— Select a saved team —</option>';
  teams.forEach(function(name){
    var opt = document.createElement('option');
    opt.value = name;          // exact suffix used for lookup
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function saveTeam(){
  var name = val('teamName').trim();
  if(!name){ alert('Please enter a team name first.'); return; }
  localStorage.setItem(teamKey(name), JSON.stringify(getAllData()));
  refreshTeamList();
  // Select the just-saved team in the dropdown
  document.getElementById('teamSelect').value = name;
  alert('Team "' + name + '" saved!');
}

function openTeam(){
  var sel  = document.getElementById('teamSelect');
  var name = sel.value;   // exact suffix from dropdown
  if(!name){ alert('Please select a team from the dropdown first.'); return; }
  var raw = localStorage.getItem(teamKey(name));
  if(!raw){ alert('Team "' + name + '" not found.'); return; }
  try{
    loadData(JSON.parse(raw));
    document.getElementById('teamName').value = name;
    alert('Team "' + name + '" loaded!');
  }catch(e){ alert('Failed to load: ' + e.message); }
}

function deleteTeam(){
  var sel  = document.getElementById('teamSelect');
  var name = sel.value;
  if(!name){ alert('Please select a team from the dropdown first.'); return; }
  if(!confirm('Delete team "' + name + '"?')) return;
  localStorage.removeItem(teamKey(name));
  refreshTeamList();
  document.getElementById('teamName').value = '';
  alert('Team "' + name + '" deleted.');
}

// ── player search ─────────────────────────────────────────────────────────────
function searchPlayers(){
  var q = val('playerSearch').toLowerCase();
  var res = playerDB.filter(function(p){ return (p.name||'').toLowerCase().indexOf(q) !== -1; }).slice(0,10);
  window._searchRes = res;
  document.getElementById('searchResults').innerHTML = res.map(function(p,i){
    return '<div onclick="reusePlayer('+i+')">'+esc(p.name)+(p.school?' – '+esc(p.school):'' )+'</div>';
  }).join('');
}

function reusePlayer(i){
  var p = window._searchRes[i]; if(!p) return;
  students.push(Object.assign({}, p));
  renderStudentTable(); renderStudentOverlays();
  document.getElementById('playerSearch').value = '';
  document.getElementById('searchResults').innerHTML = '';
}

// ── export PDF ────────────────────────────────────────────────────────────────
async function exportPDF(){
  try{
    var disciplineName = val('discipline').trim().toUpperCase().replace(/\s+/g,'_') || 'MOVEMENT_ORDER';
    var filename = disciplineName + '_ORDER.pdf';
    var preview = document.getElementById('previewBox');
    var canvas = await html2canvas(preview, {scale:3, useCORS:true, allowTaint:true});
    var imgData = canvas.toDataURL('image/jpeg', 1.0);
    var pdf = new window.jspdf.jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    var jsonStr = JSON.stringify({version:'1.0', data: getAllData()});
    pdf.setFontSize(1); pdf.setTextColor(255,255,255);
    var yPos = 295;
    for(var i = 0; i < jsonStr.length; i += 400){
      pdf.text('MO_JSON_CHUNK:' + jsonStr.substring(i, i+400), 2, yPos);
      yPos += 1;
      if(yPos > 296){ pdf.addPage(); yPos = 5; }
    }
    pdf.setTextColor(0,0,0);
    pdf.save(filename);
  }catch(err){ alert('PDF export failed: ' + err.message); }
}

// ── import backup ─────────────────────────────────────────────────────────────
function importBackup(event){
  var file = event.target.files[0]; if(!file) return;
  ensurePdfJs().then(function(){
    var reader = new FileReader();
    reader.onload = function(){
      var arr = new Uint8Array(reader.result);
      window.pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
        var pages = [];
        for(var p=1; p<=pdf.numPages; p++){
          pages.push(pdf.getPage(p).then(function(pg){
            return pg.getTextContent().then(function(tc){
              return tc.items.map(function(it){ return it.str; }).join('\n');
            });
          }));
        }
        Promise.all(pages).then(function(texts){
          restoreFromText(texts.join('\n'));
          event.target.value = '';
        });
      }).catch(function(e){ alert('Cannot open PDF: '+e.message); });
    };
    reader.readAsArrayBuffer(file);
  }).catch(function(e){ alert('Cannot load PDF reader: '+e.message); });
}

function restoreFromText(text){
  var chunks = [], m, re = /MO_JSON_CHUNK:([^\n]*)/g;
  while((m = re.exec(text)) !== null) chunks.push(m[1]);
  if(!chunks.length){ alert('No embedded data found.'); return; }
  var json = chunks.join('');
  var last = json.lastIndexOf('}');
  if(last !== -1) json = json.substring(0, last+1);
  try{
    var obj = JSON.parse(json);
    if(obj && obj.data){ loadData(obj.data); alert('Data imported successfully!'); }
    else alert('Unrecognised data format.');
  }catch(e){ alert('Import failed: '+e.message); }
}

function ensurePdfJs(){
  return new Promise(function(resolve, reject){
    if(window.pdfjsLib){ resolve(); return; }
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = function(){
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve();
    };
    s.onerror = function(){ reject(new Error('Failed to load pdf.js')); };
    document.head.appendChild(s);
  });
}

</script>
</body>
</html>
