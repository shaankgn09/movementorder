<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movement Order Generator</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:15px}
.container{display:flex;gap:15px;flex-wrap:wrap}
.form{width:420px;background:#fff;padding:15px;border-radius:10px}
label{display:block;font-weight:bold;margin-top:8px}
input{width:100%;padding:6px;box-sizing:border-box}
.preview{position:relative;width:210mm;height:297mm;background:#fff;border:1px solid #999}
.preview img{position:absolute;left:0;top:0;width:100%;height:100%}
.overlay{position:absolute;font-weight:bold;font-size:12pt;color:#000}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
let playerDB = JSON.parse(localStorage.getItem('playerDB')||'[]');

function saveTeam(){
 const data=getAllData();
 localStorage.setItem('team_'+teamName.value, JSON.stringify(data));
 alert('Team Saved');
}

function openTeam(){
 const raw=localStorage.getItem('team_'+teamName.value);
 if(!raw){alert('Team not found');return;}
 loadData(JSON.parse(raw));
}

function deleteTeam(){
 localStorage.removeItem('team_'+teamName.value);
 alert('Team Deleted');
}

function getAllData(){
 return {
  discipline: discipline.value,
  agegroup: agegroup.value,
  venue: venue.value,
  date: date.value,
  fromdate: fromdate.value,
  todate: todate.value,
  official1: official1.value,
  designation1: designation1.value,
  posting1: posting1.value,
  official2: official2.value,
  designation2: designation2.value,
  posting2: posting2.value,
  students: students||[]
 };
}

function loadData(d){
 discipline.value=d.discipline||'';
 agegroup.value=d.agegroup||'';
 venue.value=d.venue||'';
 date.value=d.date||'';
 fromdate.value=d.fromdate||'';
 todate.value=d.todate||'';
 official1.value=d.official1||'';
 designation1.value=d.designation1||'';
 posting1.value=d.posting1||'';
 official2.value=d.official2||'';
 designation2.value=d.designation2||'';
 posting2.value=d.posting2||'';
 students=d.students||[];
 if(typeof renderStudentTable==='function') renderStudentTable();
 if(typeof renderStudentOverlays==='function') renderStudentOverlays();
 if(typeof updatePreview==='function') updatePreview();
}

function searchPlayers(){
 let q=playerSearch.value.toLowerCase();
 let res=playerDB.filter(p=>(p.name||'').toLowerCase().includes(q)).slice(0,10);
 searchResults.innerHTML=res.map((p,i)=>`<div style="cursor:pointer" onclick="reusePlayer(${i})">${p.name}</div>`).join('');
 window._searchRes=res;
}

function reusePlayer(i){
 students.push(window._searchRes[i]);
 if(typeof renderStudentTable==='function') renderStudentTable();
 if(typeof renderStudentOverlays==='function') renderStudentOverlays();
}

const oldAddStudent = window.addStudent;
window.addStudent=function(){
 oldAddStudent();
 try{
   let p={name:studentname.value,parentage:parentage.value,classname:classname.value,dob:dob.value,school:school.value};
   playerDB.push(p);
   localStorage.setItem('playerDB',JSON.stringify(playerDB));
 }catch(e){}
}

async function exportPDF(){
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();
 const data=getAllData();
 doc.text("Movement Order Backup PDF",10,10);
 doc.text("DISCIPLINE: "+(data.discipline||''),10,20);
 doc.text("JSON_START",10,40);
 doc.text(JSON.stringify({version:"1.0",data:data}),10,50,{maxWidth:180});
 doc.save("Movement_Order.pdf");
}

function importBackup(event){
 const file=event.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=function(){
   let txt=reader.result;
   let m=txt.match(/\\{[\s\S]*"version"[\s\S]*\\}/);
   if(m){
      try{
        let obj=JSON.parse(m[0]);
        loadData(obj.data);
        alert('Data Imported');
      }catch(e){alert('Import failed');}
   }else{
      alert('No embedded JSON found. Use PDFs generated by this system.');
   }
 };
 reader.readAsText(file);
}

document.addEventListener('input',()=>{
 if(typeof updatePreview==='function') updatePreview();
});

</script>
</head>
<body>
<h2>Movement Order Generator</h2>
<div class="container">
<div class="form">
<label>Discipline</label><input id="discipline">
<label>Age Group</label><input id="agegroup">
<label>Venue</label><input id="venue">
<label>Date</label><input id="date">
<label>From Date</label><input id="fromdate">
<label>To Date</label><input id="todate">
<label>Official 1</label><input id="official1">
<label>Designation 1</label><input id="designation1">
<label>Posting 1</label><input id="posting1">
<label>Official 2</label><input id="official2">
<label>Designation 2</label><input id="designation2">
<label>Posting 2</label><input id="posting2">

<hr>
<h3>Students</h3>

<label>Student Name</label><input id="studentname">
<label>Parentage</label><input id="parentage">
<label>Class</label><input id="classname">
<label>DOB</label><input id="dob">
<label>School Name</label><input id="school">

<button onclick="addStudent()">Add Student</button>
<br><br>
<table id="studentTable" border="1" style="width:100%;border-collapse:collapse">
<thead>
<tr>
<th>No</th>
<th>Name</th>
<th>Parentage</th>
<th>Class</th>
<th>DOB</th>
<th>School</th>
<th>X</th>
</tr>
</thead>
<tbody id="studentBody"></tbody>
</table>


<hr>
<label>Team Name</label><input id="teamName">

<button onclick="saveTeam()">💾 Save Team</button>
<button onclick="openTeam()">📂 Open Team</button>
<button onclick="deleteTeam()">🗑 Delete Team</button>

<br><br>
<input id="playerSearch" placeholder="Search Player" oninput="searchPlayers()">
<div id="searchResults"></div>

<br>
<button onclick="exportPDF()">📄 Export PDF</button>
<input type="file" id="pdfImport" onchange="importBackup(event)">

<button onclick="updatePreview()">Update Preview</button>

</div>

<div class="preview">
<img src="movement_order.jpg">

<div class="overlay" id="pdiscipline" style="top:6.72cm;left:3.84cm"></div>
<div class="overlay" id="pagegroup" style="top:6.72cm;left:8.5cm"></div>

<div class="overlay" id="pvenue1" style="top:6.72cm;left:13cm"></div>
<div class="overlay" id="pvenue2" style="top:9.72cm;left:13cm"></div>
<div class="overlay" id="pvenue3" style="top:12.72cm;left:13cm"></div>

<div class="overlay" id="pdate" style="top:3cm;left:15cm"></div>
<div class="overlay" id="pfrom" style="top:7.5cm;left:8cm"></div>
<div class="overlay" id="pto" style="top:7.5cm;left:12cm"></div>

<div class="overlay" id="pofficial1" style="top:22.5cm;left:3cm"></div>
<div class="overlay" id="pdesignation1" style="top:23.2cm;left:3cm"></div>
<div class="overlay" id="pposting1" style="top:23.9cm;left:3cm"></div>

<div class="overlay" id="pofficial2" style="top:22.5cm;left:11cm"></div>
<div class="overlay" id="pdesignation2" style="top:23.2cm;left:11cm"></div>
<div class="overlay" id="pposting2" style="top:23.9cm;left:11cm"></div>
<div id="studentOverlays"></div>
</div>
</div>

<script>
function updatePreview(){
pdiscipline.innerText=discipline.value;
pagegroup.innerText=agegroup.value;
pvenue1.innerText=venue.value;
pvenue2.innerText=venue.value;
pvenue3.innerText=venue.value;
pdate.innerText=date.value;
pfrom.innerText=fromdate.value;
pto.innerText=todate.value;
pofficial1.innerText=official1.value;
pdesignation1.innerText=designation1.value;
pposting1.innerText=posting1.value;
pofficial2.innerText=official2.value;
pdesignation2.innerText=designation2.value;
pposting2.innerText=posting2.value;
}


let students=[];

function addStudent(){
students.push({
name:document.getElementById('studentname').value,
parentage:document.getElementById('parentage').value,
classname:document.getElementById('classname').value,
dob:document.getElementById('dob').value,
school:document.getElementById('school').value
});

renderStudentTable();
renderStudentOverlays();
}

function deleteStudent(i){
students.splice(i,1);
renderStudentTable();
renderStudentOverlays();
}

function renderStudentTable(){
let html='';
students.forEach((s,i)=>{
html += `<tr>
<td>${i+1}</td>
<td>${s.name}</td>
<td>${s.parentage}</td>
<td>${s.classname}</td>
<td>${s.dob}</td>
<td>${s.school}</td>
<td><button onclick="deleteStudent(${i})">❌</button></td>
</tr>`;
});
const body=document.getElementById('studentBody');
if(body) body.innerHTML=html;
}

function renderStudentOverlays(){
const box=document.getElementById('studentOverlays');
box.innerHTML='';

students.forEach((s,i)=>{
let top = 14.30 + (i*0.78);

box.innerHTML += `
<div class="overlay" style="top:${top}cm;left:2.0cm">${s.name}</div>
<div class="overlay" style="top:${top}cm;left:5.0cm">${s.parentage}</div>
<div class="overlay" style="top:${top}cm;left:8.0cm">${s.classname}</div>
<div class="overlay" style="top:${top}cm;left:11.0cm">${s.dob}</div>
<div class="overlay" style="top:${top}cm;left:14.0cm">${s.school}</div>`;
});
}

let playerDB = JSON.parse(localStorage.getItem('playerDB')||'[]');

function saveTeam(){
 const data=getAllData();
 localStorage.setItem('team_'+teamName.value, JSON.stringify(data));
 alert('Team Saved');
}

function openTeam(){
 const raw=localStorage.getItem('team_'+teamName.value);
 if(!raw){alert('Team not found');return;}
 loadData(JSON.parse(raw));
}

function deleteTeam(){
 localStorage.removeItem('team_'+teamName.value);
 alert('Team Deleted');
}

 return {
  discipline: discipline.value,
  agegroup: agegroup.value,
  venue: venue.value,
  date: date.value,
  fromdate: fromdate.value,
  todate: todate.value,
  official1: official1.value,
  designation1: designation1.value,
  posting1: posting1.value,
  official2: official2.value,
  designation2: designation2.value,
  posting2: posting2.value,
  students: students||[]
 };
}

 discipline.value=d.discipline||'';

 venue.value=d.venue||'';

 todate.value=d.todate||'';
 official1.value=d.official1||'';
 designation1.value=d.designation1||'';
 posting1.value=d.posting1||'';
 official2.value=d.official2||'';
 designation2.value=d.designation2||'';
 posting2.value=d.posting2||'';
 students=d.students||[];
 if(typeof renderStudentTable==='function') renderStudentTable();
 if(typeof renderStudentOverlays==='function') renderStudentOverlays();
 if(typeof updatePreview==='function') updatePreview();
}

function searchPlayers(){
 let q=playerSearch.value.toLowerCase();
 let res=playerDB.filter(p=>(p.name||'').toLowerCase().includes(q)).slice(0,10);
 searchResults.innerHTML=res.map((p,i)=>`<div style="cursor:pointer" onclick="reusePlayer(${i})">${p.name}</div>`).join('');
 window._searchRes=res;
}

function reusePlayer(i){
 students.push(window._searchRes[i]);
 if(typeof renderStudentTable==='function') renderStudentTable();
 if(typeof renderStudentOverlays==='function') renderStudentOverlays();
}

const oldAddStudent = window.addStudent;
window.addStudent=function(){
 oldAddStudent();
 try{
   let p={name:studentname.value,parentage:parentage.value,classname:classname.value,dob:dob.value,school:school.value};
   playerDB.push(p);
   localStorage.setItem('playerDB',JSON.stringify(playerDB));
 }catch(e){}
}

async function exportPDF(){
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();
 const data=getAllData();
 doc.text("Movement Order Backup PDF",10,10);
 doc.text("DISCIPLINE: "+(data.discipline||''),10,20);
 doc.text("JSON_START",10,40);
 doc.text(JSON.stringify({version:"1.0",data:data}),10,50,{maxWidth:180});
 doc.save("Movement_Order.pdf");
}

function importBackup(event){
 const file=event.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=function(){
   let txt=reader.result;
   let m=txt.match(/\\{[\s\S]*"version"[\s\S]*\\}/);
   if(m){
      try{
        let obj=JSON.parse(m[0]);
        loadData(obj.data);
        alert('Data Imported');
      }catch(e){alert('Import failed');}
   }else{
      alert('No embedded JSON found. Use PDFs generated by this system.');
   }
 };
 reader.readAsText(file);
}

document.addEventListener('input',()=>{
 if(typeof updatePreview==='function') updatePreview();
});

</script>

<script>
function editStudent(i){
 const s = students[i];
 if(!s) return;
 document.getElementById('studentname').value = s.name || '';
 document.getElementById('parentage').value = s.parentage || '';
 document.getElementById('classname').value = s.classname || '';
 document.getElementById('dob').value = s.dob || '';
 document.getElementById('school').value = s.school || '';
 students.splice(i,1);
 renderStudentTable();
 renderStudentOverlays();
}

renderStudentTable = function(){
 let html='';
 students.forEach((s,i)=>{
 html += `<tr>
<td>${i+1}</td>
<td>${s.name||''}</td>
<td>${s.parentage||''}</td>
<td>${s.classname||''}</td>
<td>${s.dob||''}</td>
<td>${s.school||''}</td>
<td><button onclick="editStudent(${i})">✏️ Edit</button></td>
<td><button onclick="deleteStudent(${i})">❌</button></td>
</tr>`;
 });
 const body=document.getElementById('studentBody');
 if(body) body.innerHTML=html;
};

const _oldAddStudent = window.addStudent;
window.addStudent = function(){
 _oldAddStudent();
 try{
   localStorage.setItem('playerDB', JSON.stringify(playerDB));
 }catch(e){}
};

window.addEventListener('load', ()=>{
 try{
   playerDB = JSON.parse(localStorage.getItem('playerDB') || '[]');
 }catch(e){}
});
</script>
</body>
</html>
